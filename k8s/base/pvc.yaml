apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: singalong-data
  namespace: karaoke
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      # The favorites DB is tiny; this is headroom. local-path binds the volume
      # to whichever node the pod first lands on, pinning it there afterwards.
      storage: 1Gi
