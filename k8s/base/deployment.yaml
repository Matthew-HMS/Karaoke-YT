apiVersion: apps/v1
kind: Deployment
metadata:
  name: singalong
  namespace: karaoke
  labels:
    app: singalong
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the app holds room state in-memory and writes
  # SQLite on a ReadWriteOnce volume, so only ONE pod may run at a time. A second
  # pod would deadlock on the RWO volume. This means a few seconds' downtime per
  # deploy — acceptable for this app, and the price of single-writer state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: singalong
  template:
    metadata:
      labels:
        app: singalong
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # Makes the mounted PVC group-writable by the non-root `node` user.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/matthew-hms/karaoke-yt:latest
          # The image tag is mutable (`:latest`), so IfNotPresent would keep
          # running a stale cached image after a push — the node never re-pulls
          # for an unchanged tag name. Always re-pull on (re)start so a deploy
          # actually ships the new code + image deps (e.g. ffmpeg). For a fully
          # reproducible deploy, pin an immutable tag (a git SHA) instead.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: singalong-config
            - secretRef:
                name: singalong-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            # YouTube cookies for yt-dlp audio download (target-pitch line). The
            # datacenter IP is bot-walled, so downloads need a signed-in session.
            - name: yt-cookies
              mountPath: /secrets/yt
              readOnly: true
          # Startup can include `yt-dlp -U` + Next.js warmup, so gate liveness
          # behind a generous startupProbe, then check health steadily.
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            # timeout defaults to 1s, which /healthz can miss when the process is
            # under memory/CPU pressure — a spurious failure then kills the pod.
            # Give the probe room to answer before we treat it as down.
            timeoutSeconds: 5
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              # yt-dlp spawns python for search on top of the Next.js baseline; at
              # 768Mi the container was being OOMKilled (exit 137) under real search
              # load, restarting every time and surfacing as ~10s of nginx 502s.
              cpu: "1"
              memory: "1536Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: singalong-data
        # `optional: true` so the pod still starts if the Secret isn't created
        # yet (the app just runs without cookies until it exists). Create it with:
        #   kubectl -n karaoke create secret generic youtube-cookies \
        #     --from-file=cookies.txt=./cookies.txt
        - name: yt-cookies
          secret:
            secretName: youtube-cookies
            optional: true
