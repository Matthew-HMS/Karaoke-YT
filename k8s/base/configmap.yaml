apiVersion: v1
kind: ConfigMap
metadata:
  name: singalong-config
  namespace: karaoke
data:
  # Non-secret runtime config. Secrets (AUTH_*, YOUTUBE_API_KEY) come from the
  # `singalong-secrets` Secret created out-of-band — see k8s/README.md.
  NODE_ENV: "production"
  DB_PATH: "/data/singalong.db"
  YTDLP_PATH: "/usr/local/bin/yt-dlp"
  # OFFLOAD the karaoke target-pitch generation. This cluster's datacenter IP is
  # bot-walled by YouTube (cookies/proxy tricks are fragile), so we DON'T download
  # here. With REFERENCE_OFFLOAD=1 the app just records which videos need a
  # contour (GET /api/reference/pending); an external worker on a non-walled IP
  # (scripts/generate-worker.ts, e.g. on a school/home box) generates them and
  # POSTs them back to /api/reference. REFERENCE_INGEST_TOKEN (in the Secret)
  # authenticates that worker. Set to "0"/unset to generate on the cluster again.
  REFERENCE_OFFLOAD: "1"
  # The YTDLP_* settings below only matter when NOT offloading (they tune the
  # cluster's own yt-dlp). Kept for the fallback path.
  YTDLP_COOKIES: "/secrets/yt/cookies.txt"
  YTDLP_EXTRACTOR_ARGS: "youtube:player_client=tv"
  YTDLP_PROXY: ""
  # Public origin — MUST be your real DuckDNS host (used by Auth.js for OAuth
  # redirects). Replace EXAMPLE everywhere before applying.
  AUTH_URL: "https://sho-karaoke.duckdns.org"
  AUTH_TRUST_HOST: "true"
