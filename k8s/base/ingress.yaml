apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: singalong
  namespace: karaoke
  annotations:
    # cert-manager issues + renews the TLS cert into `singalong-tls` using the
    # production ClusterIssuer created by the cert-manager-webhook-duckdns chart
    # (DNS-01). To test without hitting LE rate limits, swap to
    # cert-manager-webhook-duckdns-staging first.
    cert-manager.io/cluster-issuer: cert-manager-webhook-duckdns-production
    # Socket.IO holds long-lived WebSocket connections. ingress-nginx upgrades
    # WebSockets automatically; these long timeouts stop it cutting idle-ish
    # connections. (Single replica, so no session-affinity needed.)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sho-karaoke.duckdns.org
      secretName: singalong-tls
  rules:
    - host: sho-karaoke.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: singalong
                port:
                  number: 80
