name: Build image

# Builds the container image and pushes it to GHCR. The Kubernetes cluster pulls
# from there (it runs containerd — no Docker needed on the nodes). Tagged by both
# the long commit SHA (immutable, for rollbacks) and `latest` on main.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "deploy/**"
  workflow_dispatch:

# Never let two image-build/deploys race the rollout; let an in-flight one finish.
concurrency:
  group: k8s-deploy
  cancel-in-progress: false

jobs:
  build:
    # Native arm64 runner (free for public repos) — no QEMU emulation, so the
    # better-sqlite3 native compile + `next build` run at full speed (~minutes
    # instead of ~20). Matches the cluster's arm64 nodes.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically; resolves to ghcr.io/<owner>/<repo>.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Cluster nodes are all arm64 (Oracle Ampere).
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll the new image out to the cluster. The kube-apiserver is on a private IP,
  # so we SSH to the control-plane node (same access model as deploy.yml) and let
  # kubectl there pin the Deployment to this commit's immutable image tag.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Roll out to Kubernetes
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            kubectl -n karaoke set image deployment/singalong \
              app=ghcr.io/${REPO}:sha-${{ github.sha }}
            kubectl -n karaoke rollout status deployment/singalong --timeout=180s
