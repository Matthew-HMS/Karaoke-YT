name: CI / CD

# One pipeline for both CI and CD:
#   - changes → classifies the push: image-affecting CODE vs. k8s MANIFESTS only
#   - test    → type-check + unit tests (every PR and every push to main)
#   - build   → builds the image + pushes to GHCR — ONLY when code changed
#   - deploy  → applies manifests + rolls out to Kubernetes (main only)
# A config-only change (e.g. editing a ConfigMap) therefore DEPLOYS without a
# costly arm64 rebuild: only real code/Dockerfile/deps changes rebuild the image.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "deploy/**"
  pull_request:
  workflow_dispatch:

jobs:
  # What kind of change is this? `code` = anything baked into the image (app
  # source, Dockerfile, deps, entrypoint). `manifests` = k8s/** only. These gate
  # whether we rebuild the image and/or just re-apply config.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      manifests: ${{ steps.filter.outputs.manifests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!k8s/**'
              - '!.github/**'
              - '!**.md'
              - '!deploy/**'
            manifests:
              - 'k8s/**'

  # CI gate — type-check + unit tests. Runs for PRs and for main pushes.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      # Informational only — the app has some pre-existing react-hooks findings.
      - name: Lint
        run: npm run lint
        continue-on-error: true

  build:
    # Build/push ONLY when image-affecting code changed (skip for manifest- or
    # docs-only pushes), on main or a manual run — never for pull requests.
    needs: [test, changes]
    if: ${{ github.event_name != 'pull_request' && needs.changes.outputs.code == 'true' }}
    # Native arm64 runner (free for public repos) — no QEMU emulation, so the
    # better-sqlite3 native compile + `next build` run at full speed (~minutes
    # instead of ~20). Matches the cluster's arm64 nodes.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically; resolves to ghcr.io/<owner>/<repo>.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Cluster nodes are all arm64 (Oracle Ampere).
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll out to the cluster. The kube-apiserver is on a private IP, so we ship the
  # manifests to the control-plane node and run kubectl there. Runs when CODE was
  # rebuilt OR when only MANIFESTS changed — `always()` keeps a skipped `build`
  # (the config-only path) from skipping the deploy too.
  deploy:
    needs: [changes, test, build]
    if: ${{ always() && github.event_name != 'pull_request' && needs.test.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.changes.outputs.code == 'true' || needs.changes.outputs.manifests == 'true') }}
    runs-on: ubuntu-latest
    # Never let two deploys race the rollout; let an in-flight one finish. Scoped
    # to this job so PR test runs aren't serialized behind a deploy.
    concurrency:
      group: k8s-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # The node needs the manifest files to `kubectl apply -k`, so copy the k8s/
      # tree over (same SSH credentials as the rollout step below).
      - name: Copy k8s manifests to the node
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "k8s"
          target: "Karaoke-YT"
          overwrite: true

      - name: Apply manifests + roll out
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # Default command_timeout is 10m; the rollout below waits up to 10m on a
          # cold image pull, so give the SSH command headroom above that.
          command_timeout: 20m
          script: |
            set -e
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            NS=karaoke
            DIR=~/Karaoke-YT/k8s/base
            CODE="${{ needs.changes.outputs.code }}"

            # What's running now — so a config-only apply keeps the SAME immutable
            # image (the manifest hardcodes :latest; we don't want to silently
            # move off the sha pin just because config changed).
            CURRENT=$(kubectl -n $NS get deploy singalong \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")

            # Apply everything (ConfigMap, Service, Deployment, …) so any config
            # change lands. This is what makes a config-only deploy work.
            kubectl -n $NS apply -k "$DIR"

            if [ "$CODE" = "true" ]; then
              # Code changed → a fresh image was built for this commit; pin it.
              kubectl -n $NS set image deployment/singalong \
                app=ghcr.io/${REPO}:sha-${{ github.sha }}
            else
              # Config only → keep the running image, then restart so pods pick up
              # the new ConfigMap env (env changes don't restart pods on their own).
              [ -n "$CURRENT" ] && kubectl -n $NS set image deployment/singalong app="$CURRENT"
              kubectl -n $NS rollout restart deployment/singalong
            fi

            # 10m, not 180s: on a code deploy the node has to pull the fresh
            # sha-tagged image (large: node+python+ffmpeg+deno+yt-dlp) before the
            # single Recreate pod can start. That cold pull routinely overran 180s
            # — the deploy would fail, then succeed on re-run once the image was
            # cached on the node. A generous window rides out the first pull.
            kubectl -n $NS rollout status deployment/singalong --timeout=600s
