name: CI / CD

# One pipeline for both CI and CD:
#   - test  → runs on every pull request AND every push to main
#   - build → builds the image and pushes to GHCR (main only, needs test)
#   - deploy→ rolls the new image out to Kubernetes (main only, needs build)
# So a deploy can only happen after tests pass, and PRs get the same checks
# without building or deploying anything.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "deploy/**"
  pull_request:
  workflow_dispatch:

jobs:
  # CI gate — type-check + unit tests. Runs for PRs and for main pushes.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      # Informational only — the app has some pre-existing react-hooks findings.
      - name: Lint
        run: npm run lint
        continue-on-error: true

  build:
    # Only build/push on main (or a manual run); never for pull requests.
    if: github.event_name != 'pull_request'
    needs: test
    # Native arm64 runner (free for public repos) — no QEMU emulation, so the
    # better-sqlite3 native compile + `next build` run at full speed (~minutes
    # instead of ~20). Matches the cluster's arm64 nodes.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically; resolves to ghcr.io/<owner>/<repo>.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Cluster nodes are all arm64 (Oracle Ampere).
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll the new image out to the cluster. The kube-apiserver is on a private IP,
  # so we SSH to the control-plane node (same access model as deploy.yml) and let
  # kubectl there pin the Deployment to this commit's immutable image tag.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Never let two deploys race the rollout; let an in-flight one finish. Scoped
    # to this job so PR test runs aren't serialized behind a deploy.
    concurrency:
      group: k8s-deploy
      cancel-in-progress: false
    steps:
      - name: Roll out to Kubernetes
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            kubectl -n karaoke set image deployment/singalong \
              app=ghcr.io/${REPO}:sha-${{ github.sha }}
            kubectl -n karaoke rollout status deployment/singalong --timeout=180s
